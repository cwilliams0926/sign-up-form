<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Sign-Up Form</title>
</head>
<body>
    <aside class="branding-panel">
        <div class="odin-branding">
            <img src="images/odin-lined.png" alt="Odin logo">
            <h1>ODIN</h1>
        </div>
        <div class="photo-credit">
            <p>
                Photo by <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">
                    Halie West
                </a> on <a href="https://unsplash.com/">Unsplash</a>
            </p>
        </div>
    </aside>
    <main class="form-container">
        <section class="info-section">
            <p>
                This is not an online service! You know you need something
                like this in your life to help you realize your deepest
                dreams. Sign up <em>now</em> to get started.
            </p>
            <p>
                You <em>know</em> you want to.
            </p>
        </section>
        <section class="form-card">
            <h1>Let's Do This!</h1>
            <form action="" method="POST" id="login-form">
                <div class="form-group">
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>

                <div class="form-group">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" id="last-name" name="last-name"required>
                </div>

                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="tel" id="phone-number" name="phone-number" required>
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
            </form>
        </section>
        <section class="submission-section">
            <button type="submit" form="login-form" class="create-account-button">
                Create Account
            </button>
            <p>
                Already have an account? <a href="#">Log In</a>
            </p>
        </section>
    </main>
</body>
</html>
